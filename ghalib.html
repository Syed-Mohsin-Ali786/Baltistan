        <h1 style="text-align: center; border: 1px solid; background-color: gray; padding: 2px; border-radius: 10px;">KHARPHOCHO SKARDU</h1>
        <P>Skardu Fort or Kharpocho is a fort in Skardu in the Gilgit-Baltistan region of Pakistan. It mainly served as
            a
            military stronghold and strategic lookout. It is situated above the junction of Indus and Shigar rivers,
            overlooking the Rock of Skardu.</P>
