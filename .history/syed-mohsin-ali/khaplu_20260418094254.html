<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khaplu</title>
    <link rel="stylesheet" href="Nature.css" />
  </head>
  <body>
    <main class="hero-section">
      <div class="overlay"></div>
      <div class="main-content">
        <h1 class="glow-text">KHAPLU</h1>
        <button class="btn-explore">EXPLORE DESTINY</button>
      </div>
    </main>

    <section class="glass-grid">
      <div class="card">
        <div class="card-glass">
          <img src="./khaplu/images (1).jpeg" alt="Hushe" class="card-img" />
          <h3>Hushe Valley</h3>
          <p>Renowned for the awe-inspiring Masherbrum Peak and Laila Peak.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-glass">
          <img
            src="./khaplu/14897477359_2f83dc5306_c.jpg"
            alt="Mosque"
            class="card-img"
          />
          <h3>Chaqchan Mosque</h3>
          <p>A 700-year-old spiritual masterpiece of Gilgit Baltistan.</p>
        </div>
      </div>
    </section>
   
  </body>
</html>
